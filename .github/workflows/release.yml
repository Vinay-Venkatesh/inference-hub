name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: inferencehub-cli/go.mod
          cache-dependency-path: inferencehub-cli/go.sum
      - name: Run tests
        working-directory: inferencehub-cli
        run: go test ./...

  helm-validate:
    name: Helm validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Add Helm repositories
        run: helm repo add openwebui https://helm.openwebui.com/
      - name: Download chart dependencies
        run: helm dependency update helm/inferencehub/
      - name: Lint
        run: helm lint helm/inferencehub/
      - name: Template chart
        run: helm template inferencehub helm/inferencehub/

  publish-chart:
    name: Publish Helm chart to ghcr.io
    runs-on: ubuntu-latest
    needs: [test, helm-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Add Helm repositories
        run: helm repo add openwebui https://helm.openwebui.com/
      - name: Download chart dependencies
        run: helm dependency update helm/inferencehub/
      - name: Package chart
        run: |
          mkdir -p /tmp/helm-charts
          helm package helm/inferencehub/ --destination /tmp/helm-charts/
      - name: Push chart to OCI registry
        run: |
          CHART_VERSION=$(helm show chart helm/inferencehub/ | grep '^version:' | awk '{print $2}')
          helm push /tmp/helm-charts/inferencehub-${CHART_VERSION}.tgz oci://ghcr.io/vinay-venkatesh

  build-cli:
    name: Build CLI binaries
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: inferencehub-cli/go.mod
          cache-dependency-path: inferencehub-cli/go.sum
      - name: Build
        working-directory: inferencehub-cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p /tmp/binaries
          OUTPUT_NAME="inferencehub-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o /tmp/binaries/${OUTPUT_NAME} ./cmd/inferencehub/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: /tmp/binaries/inferencehub-${{ matrix.goos }}-${{ matrix.goarch }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-chart, build-cli]
    steps:
      - uses: actions/checkout@v4
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: /tmp/release-assets/
          merge-multiple: true
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SECTION=$(awk "/^## v${VERSION}/,/^## v[0-9]/" CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: /tmp/release-assets/*
          fail_on_unmatched_files: true
