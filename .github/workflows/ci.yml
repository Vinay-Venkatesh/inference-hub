name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint helm/inferencehub/

      - name: Lint chart (AWS values)
        run: helm lint helm/inferencehub/ -f helm/inferencehub/values-aws.yaml

      - name: Lint chart (local values)
        run: helm lint helm/inferencehub/ -f helm/inferencehub/values-local.yaml

  go-build:
    name: Go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: inferencehub-cli/go.mod
          cache-dependency-path: inferencehub-cli/go.sum

      - name: Build
        working-directory: inferencehub-cli
        run: go build ./...

      - name: Vet
        working-directory: inferencehub-cli
        run: go vet ./...

      - name: Test
        working-directory: inferencehub-cli
        run: go test ./...

  python-lint:
    name: Python scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: |
          python3 -m py_compile scripts/setup-prerequisites.py
          python3 -m py_compile scripts/uninstall-prerequisites.py
