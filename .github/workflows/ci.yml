name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repositories
        run: helm repo add openwebui https://helm.openwebui.com/

      - name: Download chart dependencies
        run: helm dependency update helm/inferencehub/

      - name: Lint chart
        run: helm lint helm/inferencehub/ -f helm/inferencehub/values-ci.yaml

      - name: Lint chart (AWS values)
        run: helm lint helm/inferencehub/ -f helm/inferencehub/values-ci.yaml -f helm/inferencehub/values-aws.yaml

      - name: Lint chart (local values)
        run: helm lint helm/inferencehub/ -f helm/inferencehub/values-ci.yaml -f helm/inferencehub/values-local.yaml

  helm-template:
    name: Helm template (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Add Helm repositories
        run: helm repo add openwebui https://helm.openwebui.com/
      - name: Download chart dependencies
        run: helm dependency update helm/inferencehub/
      - name: Template chart (default values)
        run: helm template inferencehub helm/inferencehub/ -f helm/inferencehub/values-ci.yaml
      - name: Template chart (AWS values)
        run: helm template inferencehub helm/inferencehub/ -f helm/inferencehub/values-ci.yaml -f helm/inferencehub/values-aws.yaml
      - name: Template chart (local values)
        run: helm template inferencehub helm/inferencehub/ -f helm/inferencehub/values-ci.yaml -f helm/inferencehub/values-local.yaml

  go-build:
    name: Go build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: inferencehub-cli/go.mod
          cache-dependency-path: inferencehub-cli/go.sum

      - name: Build
        working-directory: inferencehub-cli
        run: go build ./...

      - name: Vet
        working-directory: inferencehub-cli
        run: go vet ./...

      - name: Test
        working-directory: inferencehub-cli
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: inferencehub-cli

  python-lint:
    name: Python scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax
        run: |
          python3 -m py_compile scripts/setup-prerequisites.py
          python3 -m py_compile scripts/uninstall-prerequisites.py
