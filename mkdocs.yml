site_name: InferenceHub
site_description: Deploy and manage a self-hosted AI platform on Kubernetes.
site_url: https://vinay-venkatesh.github.io/inference-hub
repo_url: https://github.com/Vinay-Venkatesh/inference-hub
repo_name: Vinay-Venkatesh/inference-hub
edit_uri: edit/main/docs/

theme:
  name: material
  logo: images/logo.jpg
  favicon: images/logo.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started.md
    - Prerequisites: prerequisites.md
  - Configuration: configuration.md
  - Infrastructure: infrastructure.md
  - CLI Reference: cli-reference.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Vinay-Venkatesh/inference-hub
  version:
    provider: mike
