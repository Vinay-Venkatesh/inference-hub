{{- if and .Values.storage.enabled .Values.ollama.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvc.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.storage.pvc.accessModes | nindent 4 }}
  resources:
    requests: 
      storage: {{ .Values.storage.pvc.size }}
  storageClassName: {{ .Values.storage.storageClass.name }}
{{- end }}