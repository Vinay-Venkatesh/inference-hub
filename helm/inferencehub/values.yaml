# Default values for inferencehub
# Override these using config.yaml via the inferencehub CLI, or directly via --set / -f flags.

global:
  namespace: inferencehub

###########################################
# OpenWebUI - Chat Interface
# Full reference: https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml
# Keys managed by InferenceHub CLI (do not set — will be overridden):
#   openaiBaseApiUrl, extraEnvVars[DATABASE_URL], extraEnvVars[OPENAI_API_KEY]
#   websocket.redis.enabled, websocket.url, ollama.enabled
# To enable OpenWebUI Pipelines, set pipelines.enabled: true here or in inferencehub.yaml
###########################################
openwebui:
  # Disable subcharts that InferenceHub replaces with shared infrastructure
  ollama:
    enabled: false
  pipelines:
    enabled: false

  # Websocket: InferenceHub always sets websocket.url to its own Redis.
  # - websocket.url         → computed by CLI from your redis: config (do not set)
  # - websocket.redis.*     → entire block is ignored; InferenceHub's Redis is used instead
  # - websocket.enabled     → safe to override (set false to disable websockets entirely)
  # - websocket.nodeSelector → safe to override
  websocket:
    enabled: true
    manager: redis
    redis:
      enabled: false

  image:
    repository: ghcr.io/open-webui/open-webui
    tag: ""             # set by versions.openwebui in inferencehub.yaml
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 80
    containerPort: 8080

  resources:
    requests:
      cpu: 300m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 1.5Gi

  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""

###########################################
# LiteLLM - LLM Gateway
# Full reference: https://github.com/BerriAI/litellm/blob/main/deploy/charts/litellm-helm/values.yaml
# Keys managed by InferenceHub CLI (do not set — will be overridden):
#   masterkeySecretName, masterkeySecretKey
#   environmentSecrets (inferencehub-litellm-env is always present)
#   db.deployStandalone, proxy_config.model_list
###########################################
litellm:
  # Disable bundled PostgreSQL — InferenceHub provides a shared instance
  db:
    deployStandalone: false
    useExisting: true

  # Disable bundled Redis — InferenceHub provides a shared instance
  redis:
    enabled: false

  # Master key: reference InferenceHub's existing secret
  # masterkeySecretName and masterkeySecretKey set by CLI
  masterkeySecretName: ""
  masterkeySecretKey: ""

  image:
    repository: ghcr.io/berriai/litellm-database
    tag: ""             # set by versions.litellm in inferencehub.yaml
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 4000

  serviceAccount:
    create: true
    annotations: {}     # IRSA annotation injected by CLI when aws.litellmRoleArn is set

  proxy_config:
    model_list: []      # always overridden by CLI from inferencehub.yaml models: section
    general_settings: {}

  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 500m
      memory: 1.5Gi

###########################################
# PostgreSQL - Database
###########################################
postgresql:
  # Set to false when using an external database (RDS, Cloud SQL, etc.)
  enabled: true

  external:
    enabled: false
    # Per-app connection strings (required when external.enabled is true)
    openwebuiConnectionString: ""   # postgresql://user:pass@host:5432/openwebui
    litellmConnectionString: ""     # postgresql://user:pass@host:5432/litellm

  image:
    repository: postgres
    tag: "18-alpine"
    pullPolicy: IfNotPresent

  auth:
    username: inferencehub
    # REQUIRED: set via POSTGRES_PASSWORD env var
    password: ""

  persistence:
    enabled: true
    # Auto-detected by CLI if empty; set in values-aws.yaml to gp3
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

###########################################
# Redis - Caching
# InferenceHub deploys two separate Redis instances to avoid eviction policy
# conflicts: OpenWebUI needs session-safe eviction (noeviction/volatile-lru),
# while LiteLLM benefits from allkeys-lru for API response caching.
# Each app can independently point to an external Redis if preferred.
###########################################
redis:
  openwebui:
    # Set to false when using external Redis for OpenWebUI (ElastiCache, Upstash, etc.)
    enabled: true

    external:
      enabled: false
      host: ""
      port: 6379
      # Set via OPENWEBUI_REDIS_PASSWORD env var if auth required
      password: ""

    image:
      repository: redis
      tag: "8-alpine"
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 6379

    auth:
      # Leave empty for no auth (default for in-cluster Redis)
      # Set via OPENWEBUI_REDIS_PASSWORD env var if needed
      password: ""

    persistence:
      enabled: false
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  litellm:
    # Set to false when using external Redis for LiteLLM (ElastiCache, Upstash, etc.)
    enabled: true

    external:
      enabled: false
      host: ""
      port: 6379
      # Set via LITELLM_REDIS_PASSWORD env var if auth required
      password: ""

    image:
      repository: redis
      tag: "8-alpine"
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 6379

    auth:
      # Leave empty for no auth (default for in-cluster Redis)
      # Set via LITELLM_REDIS_PASSWORD env var if needed
      password: ""

    persistence:
      enabled: false
      storageClass: ""
      accessMode: ReadWriteOnce
      size: 2Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

###########################################
# SearXNG - Web Search (optional)
# Enables web search inside OpenWebUI via a self-hosted SearXNG metasearch engine.
# Set webSearch.enabled: true in inferencehub.yaml to activate.
###########################################
searxng:
  enabled: false
  secretKey: "ultrasecretkey" # Should be overridden by CLI

  image:
    repository: searxng/searxng
    tag: "2026.3.6-0716de6bc"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

###########################################
# Networking - Gateway API
###########################################
networking:
  gatewayAPI:
    enabled: true

    # Hostname for this InferenceHub instance
    hostname: ""

    # Reference to the existing Gateway managed by prerequisites
    # Run scripts/setup-prerequisites.sh to create this gateway
    gatewayRef:
      name: "inferencehub-gateway"
      namespace: "envoy-gateway-system"

    # Allow specifying a specific listener on the Gateway
    sectionName: ""

    tls:
      enabled: true
      # ClusterIssuer name - auto-derived from environment by the CLI:
      #   production/prod → letsencrypt-prod
      #   all others      → letsencrypt-staging
      issuerRef: "letsencrypt-staging"
      secretName: "inferencehub-tls"

###########################################
# Observability - Optional
###########################################
observability:
  langfuse:
    enabled: false
    host: "https://cloud.langfuse.com"
    # Set via LANGFUSE_PUBLIC_KEY and LANGFUSE_SECRET_KEY env vars
    publicKey: ""
    secretKey: ""
