{{- if not .Values.postgresql.external.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inferencehub.fullname" . }}-postgresql-secret
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  postgres-user: {{ .Values.postgresql.auth.username | quote }}
  openwebui-database-url: {{ include "inferencehub.postgresql.openwebuiConnectionString" . | quote }}
  litellm-database-url: {{ include "inferencehub.postgresql.litellmConnectionString" . | quote }}
{{- end }}
