{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inferencehub.fullname" . }}-postgresql-secret
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PostgreSQL credentials
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  postgres-user: {{ .Values.postgresql.auth.username | quote }}
  postgres-database: {{ .Values.postgresql.auth.database | quote }}
  # Connection string for applications
  connection-string: {{ include "inferencehub.postgresql.connectionString" . | quote }}
{{- end }}
