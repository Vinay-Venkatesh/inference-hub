{{- if and .Values.postgresql.enabled (not .Values.postgresql.external.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inferencehub.fullname" . }}-postgresql-init
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.postgresql.labels" . | nindent 4 }}
data:
  init-databases.sh: |
    #!/bin/bash
    set -e

    echo "Creating databases and users..."

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      -- Create app user if it doesn't exist
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ .Values.postgresql.auth.username }}') THEN
          CREATE USER {{ .Values.postgresql.auth.username }} WITH PASSWORD '{{ .Values.postgresql.auth.password }}';
        END IF;
      END
      \$\$;

      -- Create openwebui database
      SELECT 'CREATE DATABASE openwebui'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'openwebui')
      \gexec

      -- Create litellm database
      SELECT 'CREATE DATABASE litellm'
      WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'litellm')
      \gexec

      -- Grant privileges on both databases
      GRANT ALL PRIVILEGES ON DATABASE openwebui TO {{ .Values.postgresql.auth.username }};
      GRANT ALL PRIVILEGES ON DATABASE litellm TO {{ .Values.postgresql.auth.username }};
    EOSQL

    echo "Database initialization complete!"
{{- end }}
