{{- $hasPg := or .Values.postgresql.enabled .Values.postgresql.external.enabled }}
{{- $hasRedis := or .Values.redis.litellm.enabled .Values.redis.litellm.external.enabled }}
{{- if or $hasPg $hasRedis }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inferencehub.fullname" . }}-litellm-env
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.litellm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $hasPg }}
  DATABASE_URL: {{ include "inferencehub.postgresql.litellmConnectionString" . | quote }}
  {{- end }}
  {{- if $hasRedis }}
  REDIS_HOST: {{ include "inferencehub.redis.litellm.host" . | quote }}
  REDIS_PORT: {{ include "inferencehub.redis.litellm.port" . | quote }}
  {{- with (coalesce .Values.redis.litellm.external.password .Values.redis.litellm.auth.password) }}
  REDIS_PASSWORD: {{ . | quote }}
  {{- end }}
  {{- end }}
{{- end }}
