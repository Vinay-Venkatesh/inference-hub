apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferencehub.fullname" . }}-litellm
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.litellm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.litellm.replicaCount }}
  selector:
    matchLabels:
      {{- include "inferencehub.litellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferencehub.litellm.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "inferencehub.litellm.serviceAccountName" . }}
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.litellm.service.targetPort }}
              protocol: TCP
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-litellm-secret
                  key: master-key
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              value: {{ include "inferencehub.redis.host" . | quote }}
            - name: REDIS_PORT
              value: {{ include "inferencehub.redis.port" . | quote }}
            {{- if or (and .Values.redis.auth.password (not .Values.redis.external.enabled)) (and .Values.redis.external.enabled .Values.redis.external.password) }}
            - name: REDIS_PASSWORD
              {{- if .Values.redis.external.enabled }}
              value: {{ .Values.redis.external.password | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-redis-secret
                  key: redis-password
              {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.litellm.awsRegion }}
            - name: AWS_REGION
              value: {{ .Values.litellm.awsRegion | quote }}
            {{- end }}
            {{- if .Values.observability.langfuse.enabled }}
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-litellm-secret
                  key: langfuse-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-litellm-secret
                  key: langfuse-secret-key
            - name: LANGFUSE_HOST
              value: {{ .Values.observability.langfuse.host | quote }}
            {{- end }}
          args:
            - "--config"
            - "/app/gateway_config.yaml"
          volumeMounts:
            - name: config-volume
              mountPath: /app/gateway_config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            {{- toYaml .Values.litellm.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.litellm.readinessProbe | nindent 12 }}
          {{- if .Values.litellm.resources }}
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "inferencehub.fullname" . }}-litellm-config
