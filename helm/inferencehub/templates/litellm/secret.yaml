apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inferencehub.fullname" . }}-litellm-secret
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.litellm.labels" . | nindent 4 }}
type: Opaque
stringData:
  master-key: {{ .Values.litellm.masterKey | required "litellm.masterKey is required. Set LITELLM_MASTER_KEY in your environment." | quote }}
  {{- if .Values.observability.langfuse.enabled }}
  langfuse-public-key: {{ .Values.observability.langfuse.publicKey | required "observability.langfuse.publicKey is required when Langfuse is enabled." | quote }}
  langfuse-secret-key: {{ .Values.observability.langfuse.secretKey | required "observability.langfuse.secretKey is required when Langfuse is enabled." | quote }}
  {{- end }}
