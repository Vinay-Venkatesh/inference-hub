apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferencehub.fullname" . }}-openwebui
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.openwebui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.openwebui.replicaCount }}
  selector:
    matchLabels:
      {{- include "inferencehub.openwebui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferencehub.openwebui.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: openwebui
          image: "{{ .Values.openwebui.image.repository }}:{{ .Values.openwebui.image.tag }}"
          imagePullPolicy: {{ .Values.openwebui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.openwebui.service.targetPort }}
              protocol: TCP
          env:
            - name: OPENAI_API_BASE_URL
              value: {{ printf "http://%s-litellm:%d/v1" (include "inferencehub.fullname" .) (.Values.litellm.service.port | int) | quote }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-litellm-secret
                  key: master-key

            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              {{- if .Values.postgresql.external.enabled }}
              value: {{ include "inferencehub.postgresql.connectionString" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-postgresql-secret
                  key: connection-string
              {{- end }}
            {{- end }}

            - name: OLLAMA_BASE_URL
              value: {{ .Values.openwebui.env.ollamaBaseUrl | quote }}
            - name: ENABLE_OLLAMA
              value: {{ .Values.openwebui.env.enableOllama | quote }}
            - name: ENABLE_EXTERNAL_CONNECTIONS
              value: {{ .Values.openwebui.env.enableExternalConnections | quote }}
            - name: WEBUI_DISABLE_PROVIDER_DISCOVERY
              value: {{ .Values.openwebui.env.webuiDisableProviderDiscovery | quote }}

          {{- if .Values.openwebui.resources }}
          resources:
            {{- toYaml .Values.openwebui.resources | nindent 12 }}
          {{- end }}
