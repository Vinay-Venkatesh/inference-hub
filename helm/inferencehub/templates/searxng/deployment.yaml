{{- if .Values.searxng.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inferencehub.fullname" . }}-searxng
  namespace: {{ include "inferencehub.namespace" . }}
  labels:
    {{- include "inferencehub.searxng.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "inferencehub.searxng.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inferencehub.searxng.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: searxng
          image: "{{ .Values.searxng.image.repository }}:{{ .Values.searxng.image.tag }}"
          imagePullPolicy: {{ .Values.searxng.image.pullPolicy }}
          env:
            - name: SEARXNG_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inferencehub.fullname" . }}-searxng-secret
                  key: secret-key
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
          {{- if .Values.searxng.resources }}
          resources:
            {{- toYaml .Values.searxng.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "inferencehub.fullname" . }}-searxng-config
{{- end }}
